name: YouTube Playlist Generator

on:
  schedule:
    - cron: "0 */6 * * *"    # Her 6 saatte bir
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Generate Playlist
        run: python generate_hls_playlist.py

      - name: Commit & Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add ytbred_hls.m3u
          
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update ytbred_hls.m3u - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Playlist güncellendi"
          fi
