name: YouTube ID Kontrol & m3u8 Güncelle

on:
  schedule:
    - cron: "0 */2 * * *"     # Her 2 saatte bir
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run YouTube ID Kontrol Script
        run: python ytkontrolm3u.py

      - name: Commit & Push Changes
        run: |
          git config --local user.name "botechred"
          git config --local user.email "botechred@gmail.com"
          
          git add -A
          
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Update YouTube IDs & m3u8 - $(date '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Successfully updated and pushed"
          fi
